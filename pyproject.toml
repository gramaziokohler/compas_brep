[project]
name = "compas-brep"
version = "0.1.0"
description = "Pure Python Brep implementation based on COMPAS framework"
readme = "README.md"
authors = [
    { name = "Chen Kasirer", email = "kasirer@arch.ethz.ch" }
]
requires-python = ">=3.13"
dependencies = [
    "compas>=2.0",
    "compas_viewer>=1.0",
]

[build-system]
requires = ["uv_build>=0.10.2,<0.11.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ruff>=0.11",
    "pytest>=8.0",
]

[tool.ruff]
line-length = 120
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
