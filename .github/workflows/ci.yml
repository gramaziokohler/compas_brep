name: CI

on:
  push:
  pull_request:

jobs:
  test-occ:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install compas_brep with OCC backend
        run: pip install -e ".[occ]"

      - name: Run OCC tests
        run: pytest -m occ -v
